name = "reyhane"
compatibility_date = "2024-01-01"
pages_build_output_dir = "."

# D1 and R2 bindings must be added in Cloudflare Dashboard:
# Pages > Project > Settings > Functions > D1/R2 bindings
#   D1:  binding name "DB", database "reyhane-registrations"
#   R2:  binding name "RECEIPTS", bucket "reyhane-receipts"
# Environment variable: ADMIN_PASSWORD

[vars]
MAX_CAPACITY = "20"
COURSE_PRICE = "2500000"
CARD_NUMBER = "6104337364737526"
CARD_HOLDER = "ریحانه زراعتکار"
